name: Sync pnpm lockfile

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-pnpm-lockfile
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Enable Corepack (pnpm)
        run: corepack enable

      - name: Install dependencies (update lockfile)
        run: pnpm install --no-frozen-lockfile

      - name: Remove package-lock.json (optional)
        run: |
          if [ -f package-lock.json ]; then
            rm package-lock.json
          fi

      - name: Commit changes (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add pnpm-lock.yaml package-lock.json || true

          if git diff --cached --quiet; then
            echo "No lockfile changes to commit."
            exit 0
          fi

          git commit -m "chore: sync pnpm lockfile"
          git push
